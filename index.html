<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu Sayang ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: monospace;
    overflow: hidden;
}

h1 {
    margin-top: 20px;
    color: pink;
    font-size: 35px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 30px red; }
}

video {
    width: 80%;
    border-radius: 20px;
    margin-top: 15px;
    box-shadow: 0 0 20px pink;
}

#typing {
    margin-top: 20px;
    font-size: 20px;
    min-height: 60px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: pink;
    color: black;
    font-size: 18px;
    cursor: pointer;
}

img {
    width: 150px;
    border-radius: 15px;
    margin: 10px;
    box-shadow: 0 0 10px white;
}

.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}
</style>

</head>
<body>

<h1>Untuk Kamu, SAYANGKU ❤️</h1>

<!-- VIDEO -->
<video controls autoplay loop>
    <source src="vidbucin.mp4" type="video/mp4">
</video>

<!-- MUSIK -->
<audio autoplay loop>
    <source src="lagu.mp3"type="audio/mp3">
</audio>
<audio id="musik" loop>
    <source src="lagu.mp3" type="audio/mp3">
</audio>

<script>
window.addEventListener("click", function() {
    const musik = document.getElementById("musik");
    musik.volume = 0;
    musik.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            musik.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);
});
</script>
<!-- TEXT KETIK -->
<div id="typing"></div>

<!-- FOTO -->
<div>
    <img src="fotopacar.jpg">
    <img src="fotopacar1.jpg">
    
</div>

<!-- BUTTON -->
<button onclick="alert('Aku sayang kamu lebih dari apapun ❤️')">
    Klik kalau kamu sayang aku 😘
</button>

<script>
// TYPEWRITER
const text = "Kamu itu rumah buat aku 🏡❤️\nAku nggak mau kehilangan kamu...\nSelamanya aku milik kamu 💕";
let i = 0;

function ketik() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketik, 50);
    }
}
ketik();

// HUJAN HATI
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 200);
</script>

</body>
</html>
